name: greenway_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.2.2

  # 1. Login Biometric
  local_auth: ^2.1.6
  
  # 2. Database Lokal (SQLite)
  sqflite: ^2.4.2+1
  path: ^1.9.1
  
  # 3. Sensor (Accelerometer, Gyroscope, Pedometer)
  sensors_plus: ^6.1.1
  pedometer: ^4.2.0
  
  # 4. LBS (Location Based Service)
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  
  # 5. Web Service / API
  http: ^1.1.0
  
  # 6. Fitur AI/ML & Kamera
  google_generative_ai: ^0.4.7
  camera: ^0.11.0
  image_picker: ^1.1.2
  path_provider: ^2.1.2 

  # 7. Notifikasi & Timezone
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  permission_handler: ^12.0.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Pastikan jika nanti kamu pakai aset gambar/icon, daftarkan di sini:
  # assets:
  #   - assets/images/